name: Keep Render Alive 🟢

on:
  schedule:
    - cron: '*/8 * * * *'  # Cada 8 minutos
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" https://buddy-bridge-7ioy.onrender.com
          echo ""
          
      - name: Ping again after 30s
        run: |
          sleep 30
          curl -s -o /dev/null -w "HTTP %{http_code}" https://buddy-bridge-7ioy.onrender.com
          echo ""
